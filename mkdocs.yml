site_name: MCP Atlassian
site_description: MCP server for Atlassian Jira and Confluence — with Requirements Yogi integration
site_url: https://sriluxman.github.io/mcp-atlassian-ry-xr/
repo_url: https://github.com/sriluxman/mcp-atlassian-ry-xr
repo_name: sriluxman/mcp-atlassian-ry-xr

docs_dir: site_src

theme:
  name: material
  favicon: favicon.svg
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Authentication: authentication.md
  - Usage:
    - Configuration: configuration.md
    - Tools Reference: tools-reference.md
  - Guides:
    - JQL Guide: guides/jql-guide.md
    - CQL Guide: guides/cql-guide.md
    - Common Workflows: guides/common-workflows.md
  - Jira Tools:
    - Issues: tools/jira-issues.md
    - Search & Fields: tools/jira-search-fields.md
    - Agile: tools/jira-agile.md
    - Comments & Worklogs: tools/jira-comments-worklogs.md
    - Links & Versions: tools/jira-links-versions.md
    - Attachments: tools/jira-attachments.md
    - Service Desk: tools/jira-service-desk.md
    - Forms & Metrics: tools/jira-forms-metrics.md
  - Confluence Tools:
    - Pages: tools/confluence-pages.md
    - Search: tools/confluence-search.md
    - Attachments: tools/confluence-attachments.md
    - Comments & Labels: tools/confluence-comments.md
  - Requirements Yogi:
    - Tools: tools/requirement-yogi.md
    - Search Syntax: guides/requirement-yogi-search.md
  - Advanced:
    - HTTP Transport: http-transport.md
    - Compatibility: compatibility.md
    - SLA Metrics: advanced/sla-metrics.md
    - Docker Production: advanced/docker-production.md
    - SIGPIPE Analysis: sigpipe-analysis.md
  - Troubleshooting: troubleshooting.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sriluxman/mcp-atlassian-ry-xr
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mcp-atlassian-ry/
